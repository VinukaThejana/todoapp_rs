[package]
name = "todoapp_rs"
version = "0.1.0"
edition = "2021"

[dependencies]
chrono = { version = "0.4.38", features = ["serde"] }
sqlx = { version = "0.8.2", features = [
  "runtime-tokio-rustls",
  "postgres",
  "uuid",
  "chrono",
] }
anyhow = "1.0.89"
axum = "0.7.7"
tokio = { version = "1.40.0", features = ["full"] }
serde = { version = "1.0.210", features = ["derive"] }
serde_json = "1.0.128"
uuid = "1.10.0"
thiserror = "1.0.64"
sqlx-cli = "0.8.2"
dotenv = "0.15.0"
